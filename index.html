<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Türkify — Learn Turkish through music. AI-generated lyrics synced to melodies you already know." />
    <meta name="theme-color" content="#faf8f4" />

    <!-- Nazar eye favicon — pastel blue rings -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='16' fill='%23dce8f5'/%3E%3Ccircle cx='16' cy='16' r='11.5' fill='%238898c8'/%3E%3Ccircle cx='16' cy='16' r='7.5' fill='%23e8f4fc'/%3E%3Ccircle cx='16' cy='16' r='4' fill='%238898c8'/%3E%3Ccircle cx='16' cy='16' r='2' fill='%232d2540'/%3E%3Ccircle cx='14.5' cy='14.5' r='1.1' fill='white' opacity='.85'/%3E%3C/svg%3E" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700;900&display=swap" rel="stylesheet" />

    <title>Türkify — Learn Turkish Through Music</title>

    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { font-size: 16px; -webkit-text-size-adjust: 100%; }
      body {
        font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
        background: #faf8f4;
        color: #2d2540;
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
      }
      #root { min-height: 100vh; }
      button { font-family: inherit; }
      input  { font-family: inherit; }
      :focus-visible {
        outline: 2px solid #6aaed6;
        outline-offset: 2px;
        border-radius: 4px;
      }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(106,174,214,0.35); border-radius: 3px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
